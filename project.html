<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project | XUHAO DESIGN</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Great+Vibes&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./project-detail.css" />
  </head>
  <body class="project-page">
    <svg class="liquid-glass-filter" aria-hidden="true" focusable="false">
      <filter
        id="liquid-glass-nav"
        color-interpolation-filters="sRGB"
        x="-18%"
        y="-140%"
        width="136%"
        height="380%"
      >
        <feTurbulence
          type="turbulence"
          baseFrequency="0.006 0.026"
          numOctaves="1"
          seed="13"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="0.55" result="softNoise" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="softNoise"
          scale="22"
          xChannelSelector="R"
          yChannelSelector="G"
          result="displaced"
        />
        <feColorMatrix
          in="displaced"
          type="matrix"
          values="1.06 0 0 0 0  0 1.05 0 0 0  0 0 1.07 0 0  0 0 0 1 0"
        />
      </filter>
    </svg>

    <header class="navbar">
      <a class="brand" href="./index.html#home" aria-label="XHDESIGN 首页">
        <img src="./favicon.png" alt="XHDESIGN" />
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="切换导航菜单">
        菜单
      </button>
      <nav class="menu-wrap" id="menuWrap" aria-label="主导航">
        <ul class="menu">
          <li><a href="./index.html#about">简历</a></li>
          <li><a href="./index.html#portfolio">作品</a></li>
          <li><a href="./index.html#contact">联系</a></li>
        </ul>
      </nav>
    </header>

    <main class="project-shell">
      <section class="project-media" aria-label="项目主视觉">
        <img id="projectImage" src="./imag/portfolio-cards1.webp" alt="" />
      </section>

      <section class="project-copy" aria-label="项目介绍">
        <p class="project-kicker" id="projectCategory">Project</p>
        <h1 class="project-heading" id="projectTitle">Sneakers</h1>
        <p class="project-summary" id="projectSummary"></p>
        <p class="project-body" id="projectDescription"></p>
        <ul class="project-tags" id="projectTags"></ul>
        <a class="project-back" href="./index.html#portfolio">Back To Home</a>
      </section>
    </main>

    <script type="module" src="./project-detail.js"></script>
  </body>
</html>
