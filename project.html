<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project | XUHAO DESIGN</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Great+Vibes&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-[var(--color-surface)]">
    <svg class="liquid-glass-filter" aria-hidden="true" focusable="false">
      <filter
        id="liquid-glass-nav"
        color-interpolation-filters="sRGB"
        x="-18%"
        y="-140%"
        width="136%"
        height="380%"
      >
        <feTurbulence
          type="turbulence"
          baseFrequency="0.006 0.026"
          numOctaves="1"
          seed="13"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="0.55" result="softNoise" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="softNoise"
          scale="22"
          xChannelSelector="R"
          yChannelSelector="G"
          result="displaced"
        />
        <feColorMatrix
          in="displaced"
          type="matrix"
          values="1.06 0 0 0 0  0 1.05 0 0 0  0 0 1.07 0 0  0 0 0 1 0"
        />
      </filter>
    </svg>

    <header class="navbar">
      <a class="brand" href="./index.html#home" aria-label="XHDESIGN 棣栭〉">
        <img src="./favicon.png" alt="XHDESIGN" decoding="async" />
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="鍒囨崲瀵艰埅鑿滃崟">
        <span class="menu-toggle__icon" id="menuToggleIcon" aria-hidden="true"></span>
      </button>
      <nav class="menu-wrap" id="menuWrap" aria-label="主导航">
        <ul class="menu">
          <li><a href="./index.html#about">关于</a></li>
          <li><a href="./index.html#portfolio">作品</a></li>
          <li><a href="./index.html#contact">联系</a></li>
        </ul>
      </nav>
    </header>

    <main class="mx-auto mt-8 mb-24 grid w-[min(1200px,calc(100%-48px))] grid-cols-1 gap-7 md:grid-cols-[minmax(0,1.2fr)_minmax(280px,0.8fr)] md:gap-12 md:items-start md:mt-8 md:mb-24 max-md:mt-[calc(env(safe-area-inset-top,0px)+88px)] max-md:mb-12 max-md:w-[calc(100%-32px)]">
      <section class="relative overflow-hidden rounded-[22px] bg-[#f7f7f7] shadow-[0_28px_72px_rgba(15,23,42,0.08)] md:rounded-[28px]" aria-label="项目主视觉">
        <img id="projectImage" class="block aspect-square w-full object-cover" src="./imag/portfolio-cards1.webp" alt="" fetchpriority="high" decoding="async" />
      </section>

      <section class="flex flex-col gap-[18px] pt-0 md:gap-6 md:pt-3" aria-label="项目介绍">
        <p id="projectCategory" class="m-0 text-[13px] font-semibold uppercase tracking-[0.12em] text-[var(--color-muted)]">Project</p>
        <h1 id="projectTitle" class="m-0 font-[var(--title-font)] text-[clamp(42px,12vw,64px)] leading-[0.9] text-[var(--color-title)] md:text-[clamp(52px,7vw,88px)]">Sneakers</h1>
        <p id="projectSummary" class="m-0 text-[16px] leading-[1.6] text-[var(--color-soft-text)] md:text-[clamp(18px,2vw,24px)] md:leading-[1.55]"></p>
        <p id="projectDescription" class="m-0 text-[15px] leading-[1.68] text-[var(--color-text)] md:text-[16px] md:leading-[1.72]"></p>
        <ul id="projectTags" class="m-0 flex list-none flex-wrap gap-3 p-0 [&>li]:rounded-full [&>li]:border [&>li]:border-[var(--color-line)] [&>li]:bg-[var(--color-surface)] [&>li]:px-4 [&>li]:py-[10px] [&>li]:text-[13px] [&>li]:text-[var(--color-text)]"></ul>
        <a class="inline-flex w-fit items-center justify-center rounded-full bg-[var(--color-text)] px-[18px] py-3 text-[14px] font-semibold text-[var(--color-on-dark)] no-underline" href="./index.html#portfolio">Back To Home</a>
      </section>
    </main>
    <script type="module" src="./src/project-page-entry.jsx"></script>
  </body>
</html>
